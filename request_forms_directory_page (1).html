<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nichiha Claims & Returns Forms Directory</title>
  <style>
    :root {
      --primary: #1f4e79;
      --secondary: #2d7dd2;
      --bg: #f4f6f9;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #e5e7eb;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    header {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
      padding: 40px 20px;
      text-align: center;
    }

    header h1 {
      margin: 0;
      font-size: 28px;
    }

    header p {
      margin-top: 10px;
      font-size: 14px;
      opacity: 0.9;
    }

    .container {
      max-width: 900px;
      margin: 30px auto;
      padding: 0 20px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
      transition: transform 0.15s ease;
    }

    .card:hover {
      transform: translateY(-2px);
    }

    .card h2 {
      margin-top: 0;
      font-size: 20px;
      color: var(--primary);
    }

    .card p {
      color: var(--muted);
      font-size: 14px;
      margin: 10px 0;
    }

    .btn {
      display: inline-block;
      margin-top: 10px;
      padding: 10px 16px;
      background: var(--secondary);
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-size: 14px;
      transition: background 0.2s ease;
    }

    .btn:hover {
      background: var(--primary);
    }

    .section-title {
      margin: 30px 0 10px;
      font-size: 18px;
      color: var(--primary);
    }

    footer {
      text-align: center;
      padding: 20px;
      font-size: 12px;
      color: var(--muted);
    }
  </style>
</head>
<body>

<header>
  <img src="https://images.squarespace-cdn.com/content/v1/57f42a296a4963c13b7d265d/1641323455856-WXNTYOGI1ZFHVDNLRL1G/nichiha+logo.png?format=2500w" alt="Company Logo" style="margin-bottom:16px; max-width:320px; height:auto;" />
  <h1>Nichiha Claims & Returns Forms Directory</h1>
  <p>Select the appropriate form below to submit your request</p>
</header>

<div class="container">

  <div class="card">
    <h2>Claims Form</h2>
    <p>Use this form for any claim-related requests.</p>
    <a class="btn" href="https://form.asana.com/?k=zbYGIPkAqvwayMMnLir7wg&d=9070525082268" target="_blank">Open Form</a>
  </div>

  <div class="card">
    <h2>Return Form</h2>
    <p>Use this form for any standard return requests.</p>
    <a class="btn" href="https://form.asana.com/?k=el0sbwWQHE0pecbELx9PEA&d=9070525082268" target="_blank">Open Form</a>
  </div>

</div>

<footer>
  © Nichiha
</footer>

</body>
</html>
